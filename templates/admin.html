<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Admin</title>

<style>
body {
    margin: 0;
    font-family: sans-serif;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color: white;
}

.container {
    width: 90%;
    margin: 50px auto;
}

.card {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(20px);
    padding: 20px;
    border-radius: 20px;
}

h1 {
    text-align: center;
    color: #00eaff;
}

table {
    width: 100%;
    margin-top: 20px;
}

th, td {
    padding: 10px;
    border-bottom: 1px solid rgba(255,255,255,0.2);
}

tr:hover {
    background: rgba(255,255,255,0.1);
}
</style>
</head>

<body>

<div class="container">
    <div class="card">
        <h1>👑 ADMIN</h1>

        <table>
            <tr>
                <th>ID</th>
                <th>Username</th>
                <th>Password</th>
            </tr>

            {% for user in users %}
            <tr>
                <td>{{ user.id }}</td>
                <td>{{ user.username }}</td>
                <td>{{ user.password }}</td>
            </tr>
            {% endfor %}

        </table>
    </div>
</div>

</body>
</html>
