<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: white;
}

/* Header */
.header {
    padding: 20px;
    font-size: 22px;
    font-weight: bold;
}

/* Card */
.card {
    background: rgba(255,255,255,0.08);
    margin: 20px;
    padding: 20px;
    border-radius: 20px;
    backdrop-filter: blur(10px);
    box-shadow: 0 0 20px rgba(0,255,255,0.2);
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
}

/* Progress Circle */
.circle {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    background: conic-gradient(#00f2ff 70%, #222 0);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: auto;
}

.circle span {
    font-size: 24px;
}

/* Button */
.btn {
    display: block;
    margin: 20px;
    padding: 15px;
    border-radius: 12px;
    text-align: center;
    background: linear-gradient(90deg, #00f2ff, #4facfe);
    text-decoration: none;
    color: black;
    font-weight: bold;
}

/* Glow Animation */
@keyframes glow {
    0% { box-shadow: 0 0 5px #00f2ff; }
    50% { box-shadow: 0 0 20px #00f2ff; }
    100% { box-shadow: 0 0 5px #00f2ff; }
}

.glow {
    animation: glow 2s infinite;
}
</style>
</head>

<body>

<div class="header">
🔥 Dashboard
</div>

<div class="card glow">
<h3>🔥 วันนี้ของคุณ</h3>

<div class="circle">
<span>70%</span>
</div>

<p style="text-align:center;">เป้าหมายการออกกำลังกาย</p>
</div>

<div class="card">
<h3>💪 โปรแกรมวันนี้</h3>
<p>Push-up 20 ครั้ง</p>
<p>Pull-up 10 ครั้ง</p>
<p>วิ่ง 2 กม.</p>
</div>

<a href="/" class="btn">ออกจากระบบ</a>

</body>
</html>
