<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Dashboard</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white;
}

/* Header */
.header {
    padding:20px;
    font-size:24px;
    text-align:center;
    font-weight:bold;
}

/* Glass Card */
.card {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(15px);
    margin:15px;
    padding:20px;
    border-radius:20px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
}

/* Grid */
.grid {
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap:12px;
}

/* Stat Box */
.stat {
    background: rgba(255,255,255,0.1);
    padding:15px;
    border-radius:15px;
    text-align:center;
}

/* Button */
button {
    width:100%;
    padding:14px;
    border:none;
    border-radius:15px;
    font-size:16px;
    color:white;
    margin-top:10px;
    background: linear-gradient(45deg,#00c6ff,#0072ff);
}

/* Animation */
.card:hover {
    transform: scale(1.02);
    transition: 0.3s;
}
</style>
</head>

<body>

<div class="header">
🏋️ Workout App
</div>

<div class="card">
<h2>👋 {{ user }}</h2>
<p>🔥 วันนี้เราจะโหดแค่ไหน?</p>
</div>

<div class="card">
<h3>📊 สถิติ</h3>

<div class="grid">
    <div class="stat">Push-up<br><b>20</b></div>
    <div class="stat">Squat<br><b>30</b></div>
    <div class="stat">Plank<br><b>60s</b></div>
    <div class="stat">Run<br><b>2km</b></div>
</div>

</div>

<div class="card">
<h3>💪 โปรแกรมวันนี้</h3>
<ul>
    <li>Push-up 20 ครั้ง</li>
    <li>Squat 30 ครั้ง</li>
    <li>Plank 60 วินาที</li>
</ul>

<button onclick="location.href='/workout'">
🚀 เริ่มฝึก
</button>
</div>

<div class="card">
<button onclick="location.href='/logout'">
🚪 Logout
</button>
</div>

</body>
</html>
