<!DOCTYPE html>
<html>
<head>
<style>
body {
    margin:0;
    color:white;
    font-family:sans-serif;
}

video {
    position:fixed;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:-1;
}

.overlay {
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
}

.box {
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
}

.glow {
    font-size:40px;
    animation: glow 2s infinite alternate;
}

@keyframes glow {
    from { text-shadow:0 0 10px #00d4ff; }
    to { text-shadow:0 0 30px #00d4ff; }
}

button {
    padding:15px;
    margin:10px;
    border:none;
    border-radius:10px;
    font-size:18px;
}

.login {
    background:#00c6ff;
}

.register {
    background:#a855f7;
}
</style>
</head>

<body>

<video autoplay muted loop>
    <source src="/static/bg.mp4">
</video>

<div class="overlay"></div>

<div class="box">
    <h1 class="glow">WORKOUT APP</h1>

    <a href="/login"><button class="login">เข้าสู่ระบบ</button></a>
    <a href="/register"><button class="register">สมัครสมาชิก</button></a>
</div>

</body>
</html>
